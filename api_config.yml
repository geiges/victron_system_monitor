# Victron System Monitor — REST API configuration
#
# File endpoints serve CSV log files, daily aggregates, state files,
# and system_configuration.yaml from the data/ directory.
#
# command_endpoints is populated automatically by dbus_logger.py at startup
# from the runtime-discovered D-Bus service names. Do not edit that section
# manually — it will be overwritten on next logger start.

server:
  host: "0.0.0.0"
  port: 5101
  debug: false

file_endpoints:
  - id: "victron"
    description: "Victron system monitor log files"
    base_dir: "data"
    allow_patterns:
      - "log_*.csv"
      - "daily/solar_daily.csv"
      - "state.json"
      - "state_mapping.yaml"
      - "system_configuration.yaml"

# Auto-generated by dbus_logger.py — do not edit manually.
command_endpoints: []
